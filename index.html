<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Study Planner</title>
  </head>
  <body>
    <div id="app">
      <div>
        <h1>Hello Username!</h1>
        <h2>What would you like to work on first?</h2>
        <div class="task-list">
          <div class="task card">
            <div class="task-title-group">
              <div class="class-name">C486</div>
              <div class="task-name">HW 1</div>
            </div>
            <div class="task-completion-group">
              <div class="task-due-date">Due 1/1/26</div>
              <div class="task-checkbox"><input type="checkbox"></div>
            </div>
          </div>
          <div class="task card">
            <div class="task-title-group">
              <div class="class-name">C486</div>
              <div class="task-name">HW 2</div>
            </div>
            <div class="task-completion-group">
              <div class="task-due-date">Due 1/2/26</div>
              <div class="task-checkbox"><input type="checkbox"></div>
            </div>
          </div>
          <div class="task card">
            <div class="task-title-group">
              <div class="class-name">C486</div>
              <div class="task-name">HW 3</div>
            </div>
            <div class="task-completion-group">
              <div class="task-due-date">Due 1/3/26</div>
              <div class="task-checkbox"><input type="checkbox"></div>
            </div>
          </div>
          <div class="task card">
            <div class="task-title-group">
              <div class="class-name">C486</div>
              <div class="task-name">HW 4</div>
            </div>
            <div class="task-completion-group">
              <div class="task-due-date">Due 1/4/26</div>
              <div class="task-checkbox"><input type="checkbox"></div>
            </div>
          </div>
        </div>
        
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
